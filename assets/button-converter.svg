<svg xmlns="http://www.w3.org/2000/svg" width="280" height="72" viewBox="0 0 280 72">
  <defs>
    <linearGradient id="iconBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF4D6D"/>
      <stop offset="0.55" stop-color="#EF233C"/>
      <stop offset="1" stop-color="#A30B1D"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Card background -->
  <rect x="2" y="2" width="276" height="68" rx="14" fill="#FFFFFF" stroke="#E1E5EC" stroke-width="1" filter="url(#cardShadow)"/>

  <!-- Adobe-style gradient icon block with "B" -->
  <rect x="14" y="14" width="44" height="44" rx="10" fill="url(#iconBg)"/>
  <text x="36" y="46" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif"
        font-size="26" font-weight="800" fill="#FFFFFF" letter-spacing="-1">B</text>

  <!-- Text -->
  <text x="72" y="32" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif" font-size="11" fill="#6B7280" letter-spacing="0.5">OPEN ON SEWON-P.GITHUB.IO</text>
  <text x="72" y="54" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif" font-size="20" font-weight="700" fill="#1A1E26" letter-spacing="-0.3">Base64 Converter</text>
</svg>
